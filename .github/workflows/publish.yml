name: "Publish"

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  read-version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: 'true'

      - name: Read version from config.yaml
        id: v
        run: |
          yq="docker run --rm -i -v ${PWD}:${PWD} -w ${PWD} mikefarah/yq"
          version="$($yq e '.version' config.yaml).${{ github.run_number }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    needs: read-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # armv7 not supported, see https://github.com/home-assistant/builder/issues/158
        # i386 / armhf not supported by dotnet, see https://docs.microsoft.com/en-us/dotnet/core/rid-catalog
        # The build-image action does not pass --platform to buildx, so each
        # architecture builds on a runner whose native platform matches the target.
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: 'true'
          persist-credentials: false

      - name: Build and push image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          context: .
          image: docker.io/jchown/${{ matrix.arch }}-ozric-addon
          image-tags: |
            ${{ needs.read-version.outputs.version }}
            latest
          version: ${{ needs.read-version.outputs.version }}
          push: true
          # Cosign signing is on by default but requires OIDC; disable for now.
          cosign: false
          container-registry: docker.io
          container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          labels: |
            io.hass.type=addon
            io.hass.name=Ozric
            io.hass.description=Continuous graph-based automation engine
            io.hass.url=https://github.com/jchown/ozric-addon
