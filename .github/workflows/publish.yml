name: "Publish"

on:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  REGISTRY_PREFIX: docker.io/jchown
  IMAGE_NAME: ozric-addon
  # armv7 not supported, see https://github.com/home-assistant/builder/issues/158
  # i386 / armhf not supported by dotnet, see https://docs.microsoft.com/en-us/dotnet/core/rid-catalog
  ARCHITECTURES: '["amd64","aarch64"]'

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      build_version: ${{ steps.v.outputs.build_version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: 'true'

      - name: Read version from config.yaml
        id: v
        run: |
          yq="docker run --rm -i -v ${PWD}:${PWD} -w ${PWD} mikefarah/yq"
          tag="$($yq e '.version' config.yaml)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "build_version=${tag}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: 'true'
          persist-credentials: false

      - name: Build and push image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          context: .
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.tag }}
            latest
          version: ${{ needs.prepare.outputs.build_version }}
          push: true
          # Cosign signing is on by default but requires OIDC; disable for now.
          cosign: false
          container-registry: docker.io
          container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          labels: |
            io.hass.type=addon
            io.hass.name=Ozric
            io.hass.description=Continuous graph-based automation engine
            io.hass.url=https://github.com/jchown/ozric-addon

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.prepare.outputs.tag }}
            latest
          registry-prefix: ${{ env.REGISTRY_PREFIX }}
          # Cosign signing is on by default but requires OIDC; disable for now.
          cosign: false
          container-registry: docker.io
          container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
